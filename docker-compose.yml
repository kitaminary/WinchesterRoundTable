services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: winchester
      POSTGRES_USER: winchester
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - winchester_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winchester -d winchester"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── App (production) ─────────────────────────────────────────────────────────
  winchester:
    build: .
    ports:
      - "${PORT:-3000}:3000"
      - "4040:4040"   # ngrok admin UI
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://winchester:${POSTGRES_PASSWORD:-changeme}@postgres:5432/winchester
      CHAT_HISTORY_VERSION: ${CHAT_HISTORY_VERSION:-1}
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
      ENABLE_BORE: ${ENABLE_BORE:-1}
      BORE_SERVER: ${BORE_SERVER:-bore.pub}
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── App (dev, hot reload) ────────────────────────────────────────────────────
  winchester-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${DEV_CLIENT_PORT:-5173}:5173"
      - "${DEV_SERVER_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://winchester:${POSTGRES_PASSWORD:-changeme}@postgres:5432/winchester
      CHAT_HISTORY_VERSION: ${CHAT_HISTORY_VERSION:-1}
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - winchester_dev_node_modules:/app/node_modules
    restart: "no"
    stdin_open: true
    tty: true

volumes:
  winchester_pgdata:
    driver: local
  winchester_dev_node_modules:
    driver: local
